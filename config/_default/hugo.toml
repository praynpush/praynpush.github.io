baseURL                = "https://praynpush.github.io/"
languageCode           = "zh-cn"
title                  = "My Personal Blog"
defaultContentLanguage = "zh"
hasCJKLanguage         = true
theme                  = "hugo-theme-stack"

[pagination]
    pagerSize = 10

[permalinks]
    post = "/p/:slug/"
    page = "/:slug/"

[taxonomies]
    tag  = "tags"
    category = "categories"

[outputs]
    home = ["HTML", "RSS"]

