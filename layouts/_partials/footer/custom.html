<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('{{ $sw.RelPermalink }}').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // New content is available, show the update toast
            const toast = document.getElementById('pwa-update-toast');
            if (toast) {
                toast.classList.add('show');
            }
          }
        });
      });
    }).catch(err => {
      console.log('ServiceWorker registration failed: ', err);
    });

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) {
        window.location.reload();
        refreshing = true;
      }
    });

    const updateBtn = document.getElementById('pwa-update-btn');
    if (updateBtn) {
        updateBtn.addEventListener('click', () => {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg && reg.waiting) {
              reg.waiting.postMessage('skipWaiting');
            }
          });
        });
    }
    
    const closeBtn = document.getElementById('pwa-close-btn');
    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            const toast = document.getElementById('pwa-update-toast');
            if (toast) {
                toast.classList.remove('show');
            }
        });
    }
  });
}
</script>

<style>
#pwa-update-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translate(-50%, 150%);
    background-color: var(--accent-color);
    color: var(--accent-color-text, #fff);
    padding: 10px 14px 10px 20px;
    border-radius: 30px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 9999;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
}

[data-scheme="dark"] #pwa-update-toast {
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}

#pwa-update-toast.show {
    transform: translate(-50%, 0);
    opacity: 1;
    animation: pwa-pulse 2s infinite;
}

@keyframes pwa-pulse {
    0% { box-shadow: 0 0 0 0 rgba(100, 100, 100, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(100, 100, 100, 0); }
    100% { box-shadow: 0 0 0 0 rgba(100, 100, 100, 0); }
}

.pwa-toast-content {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    font-size: 1.05rem;
    letter-spacing: 0.5px;
    white-space: nowrap;
}

.pwa-icon {
    font-size: 1.2rem;
}

#pwa-update-btn {
    background-color: rgba(255, 255, 255, 0.2);
    color: var(--accent-color-text, #fff);
    border: none;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: bold;
    transition: background-color 0.2s, transform 0.1s;
    white-space: nowrap;
}

[data-scheme="dark"] #pwa-update-btn {
    background-color: rgba(0, 0, 0, 0.25);
}

#pwa-update-btn:hover {
    background-color: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
}

[data-scheme="dark"] #pwa-update-btn:hover {
    background-color: rgba(0, 0, 0, 0.4);
}

#pwa-close-btn {
    background: transparent;
    color: var(--accent-color-text, #fff);
    border: none;
    padding: 4px;
    margin-left: -4px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: opacity 0.2s;
}

#pwa-close-btn:hover {
    opacity: 1;
}
</style>

<div id="pwa-update-toast">
    <div class="pwa-toast-content">
        <span class="pwa-icon">✨</span>
        <span class="pwa-toast-message">发现新内容</span>
    </div>
    <button id="pwa-update-btn">刷新</button>
    <button id="pwa-close-btn" aria-label="关闭">✕</button>
</div>
