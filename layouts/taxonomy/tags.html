{{- define "main" -}}
<div class="prose prose-lg mx-auto px-4 py-12 max-w-3xl">
  <h1>{{ .Title }}</h1>

  <div class="flex flex-wrap gap-2 mt-6">
    {{ range .Pages }}
      <a href="{{ .RelPermalink }}"
         class="inline-block px-4 py-2 rounded-full border border-zinc-200 dark:border-zinc-700
                text-zinc-700 dark:text-zinc-300 no-underline hover:bg-zinc-100 dark:hover:bg-zinc-800
                transition-colors duration-200">
        {{ .LinkTitle }}
        <span class="ml-1 text-sm text-zinc-500 dark:text-zinc-400">({{ .Data.Pages.Len }})</span>
      </a>
    {{ end }}
  </div>
</div>
{{- end -}}
