{{- define "main" -}}
<div class="prose prose-lg mx-auto px-4 py-12 max-w-3xl">
  <h1>{{ .Title }}</h1>

  <div class="space-y-6 mt-8">
    {{ range .Pages }}
      <article class="border-b border-zinc-200 dark:border-zinc-700 pb-6 last:border-b-0">
        <h2 class="text-xl font-semibold mb-2">
          <a href="{{ .RelPermalink }}" class="no-underline hover:text-primary-600 dark:hover:text-primary-400">
            {{ .Title }}
          </a>
        </h2>
        <time class="text-sm text-zinc-500 dark:text-zinc-400">{{ .Date | time.Format ":date_long" }}</time>
        {{ with .Params.summary }}
          <p class="mt-2 text-zinc-600 dark:text-zinc-300">{{ . }}</p>
        {{ end }}
      </article>
    {{ end }}
  </div>
</div>
{{- end -}}
